<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Goyim Earth</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ── Gleason page overrides ── */
      body {
        background: #f4ede0;
      }

      .gleason-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.2rem 1rem 3rem;
        min-height: 100vh;
      }

      .gleason-title {
        font-family: "Cinzel", serif;
        font-size: 1.6rem;
        color: #2a2316;
        letter-spacing: 0.08em;
        margin: 0 0 0.25rem;
        text-align: center;
      }

      .gleason-subtitle {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.05rem;
        color: #5a4a35;
        margin: 0 0 1.5rem;
        text-align: center;
        letter-spacing: 0.04em;
      }

      #gleason-svg {
        width: min(90vw, 700px);
        height: min(90vw, 700px);
        display: block;
        border-radius: 50%;
        box-shadow: 0 6px 32px rgba(42, 35, 22, 0.35);
      }

      /* SVG internals */
      .ocean { fill: #c6e3e8; }
      .outer-ring { fill: none; stroke: #5e4c39; stroke-width: 4; }
      .inner-clip { fill: none; }

      .graticule-lat {
        fill: none;
        stroke: #7ea7ad;
        stroke-width: 0.6;
        stroke-opacity: 0.55;
      }

      .graticule-lon {
        fill: none;
        stroke: #7ea7ad;
        stroke-width: 0.6;
        stroke-opacity: 0.55;
      }

      .land {
        fill: #d4c5a0;
        stroke: #5e4c39;
        stroke-width: 0.5;
      }

      .hour-label {
        font-family: "Cinzel", serif;
        font-size: 11px;
        fill: #2a2316;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
      }

      .lat-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 9px;
        fill: #5a4a35;
        text-anchor: start;
        dominant-baseline: middle;
        pointer-events: none;
      }

      .pole-dot {
        fill: #c0392b;
        stroke: #fff;
        stroke-width: 1;
      }

      .gleason-nav {
        margin-top: 1.5rem;
        display: flex;
        gap: 1.5rem;
      }

      .gleason-nav a {
        font-family: "Cinzel", serif;
        font-size: 0.95rem;
        color: #2a2316;
        text-decoration: none;
        border-bottom: 2px solid transparent;
        padding-bottom: 2px;
        transition: border-color 200ms;
      }

      .gleason-nav a:hover {
        border-bottom-color: var(--ring);
      }

      #sun-info {
        font-family: "Cormorant Garamond", serif;
        font-size: 0.95rem;
        color: #5a4a35;
        margin-top: 0.75rem;
        min-height: 1.4em;
        text-align: center;
      }

      /* ── Compass ───────────────────────────────────────────────────────── */
      .compass-wrap {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        perspective: 350px;
      }
      .compass-disc {
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1.15);
        will-change: transform;
        transform-style: preserve-3d;
      }
      .compass-svg {
        width: 76px;
        height: 76px;
        display: block;
        filter: drop-shadow(0 5px 14px rgba(42,35,22,0.45));
      }
      .compass-cardinal {
        font-family: "Cinzel", serif;
        font-size: 10px;
        fill: #4a3d2a;
        dominant-baseline: middle;
        text-anchor: middle;
        pointer-events: none;
      }
      .compass-north { fill: #c0392b; font-size: 11px; }
      #compass-needle {
        transform-origin: 50px 50px;
        transform-box: view-box;
        transition: transform 0.18s ease-out;
      }
      .compass-perm-btn {
        font-family: "Cinzel", serif;
        font-size: 0.65rem;
        letter-spacing: 0.07em;
        color: #4a3d2a;
        background: rgba(248,242,227,0.92);
        border: 1.5px solid rgba(42,35,22,0.3);
        border-radius: 5px;
        padding: 0.28rem 0.7rem;
        cursor: pointer;
        margin-top: 0.25rem;
        transition: background 150ms;
      }
      .compass-perm-btn:hover { background: #fff8ec; }

      @media (max-width: 600px) {
        .gleason-wrap {
          padding: 0.5rem 0.5rem 1.5rem;
        }
        .compass-wrap {
          display: flex;
          margin-top: auto;
        }
        #gleason-svg {
          margin-top: 1.4rem;
        }
        .gleason-subtitle {
          font-size: 0.9rem;
          margin-bottom: 0.5rem;
        }
        .gleason-nav {
          margin-top: auto;
          gap: 2rem;
        }
        .gleason-nav a {
          font-size: 1rem;
          padding: 0.4rem 0.2rem;
        }
        #sun-info {
          font-size: 0.85rem;
          margin-top: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="gleason-wrap">
      <p class="gleason-subtitle">Truth is stranger than fiction</p>

      <!-- Compass: mobile only, shown via CSS -->
      <div class="compass-wrap" id="compass-wrap">
        <div class="compass-disc" id="compass-disc">
          <svg class="compass-svg" viewBox="0 0 100 100" aria-hidden="true">
            <defs>
              <radialGradient id="cbezel" cx="38%" cy="32%" r="65%">
                <stop offset="0%" stop-color="#7a5c3a"/>
                <stop offset="100%" stop-color="#2a1a08"/>
              </radialGradient>
              <radialGradient id="cface" cx="38%" cy="32%" r="65%">
                <stop offset="0%" stop-color="#faf5e8"/>
                <stop offset="100%" stop-color="#ddd0b6"/>
              </radialGradient>
              <filter id="cneedle" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#2a2316" flood-opacity="0.5"/>
              </filter>
            </defs>
            <!-- Bezel -->
            <circle cx="50" cy="50" r="49" fill="url(#cbezel)"/>
            <!-- Gold ring -->
            <circle cx="50" cy="50" r="46" fill="none" stroke="#9c7c3a" stroke-width="1.3"/>
            <!-- Face -->
            <circle cx="50" cy="50" r="43" fill="url(#cface)"/>
            <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(42,35,22,0.18)" stroke-width="0.5"/>
            <!-- Major tick marks -->
            <line x1="50" y1="7" x2="50" y2="13" stroke="#4a3d2a" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="50" y1="87" x2="50" y2="93" stroke="#4a3d2a" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="7" y1="50" x2="13" y2="50" stroke="#4a3d2a" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="87" y1="50" x2="93" y2="50" stroke="#4a3d2a" stroke-width="1.8" stroke-linecap="round"/>
            <!-- Minor tick marks (intercardinal) -->
            <line x1="79.4" y1="20.6" x2="81.8" y2="18.2" stroke="#4a3d2a" stroke-width="1" stroke-linecap="round"/>
            <line x1="20.6" y1="20.6" x2="18.2" y2="18.2" stroke="#4a3d2a" stroke-width="1" stroke-linecap="round"/>
            <line x1="79.4" y1="79.4" x2="81.8" y2="81.8" stroke="#4a3d2a" stroke-width="1" stroke-linecap="round"/>
            <line x1="20.6" y1="79.4" x2="18.2" y2="81.8" stroke="#4a3d2a" stroke-width="1" stroke-linecap="round"/>
            <!-- Cardinal letters -->
            <text x="50" y="20" class="compass-cardinal compass-north">N</text>
            <text x="50" y="83" class="compass-cardinal">S</text>
            <text x="83" y="50" class="compass-cardinal">E</text>
            <text x="17" y="50" class="compass-cardinal">W</text>
            <!-- Needle (rotates via JS) -->
            <g id="compass-needle" filter="url(#cneedle)">
              <polygon points="50,25 53.5,50 46.5,50" fill="#f06c7a"/>
              <polygon points="50,75 53.5,50 46.5,50" fill="#2a1e10"/>
            </g>
            <!-- Center cap -->
            <circle cx="50" cy="50" r="3.8" fill="#9c7c3a" stroke="#5e4a30" stroke-width="0.8"/>
            <circle cx="50" cy="50" r="1.4" fill="#3a2e1e"/>
          </svg>
        </div>
        <button class="compass-perm-btn" id="compass-perm-btn" style="display:none">Tap to enable compass</button>
      </div>

      <svg id="gleason-svg" viewBox="0 0 1000 1000" role="img" aria-label="Gleason flat-earth azimuthal equidistant map"></svg>

      <nav class="gleason-nav">
        <a href="archive.html">Archive</a>
        <a href="about.html">About</a>
      </nav>
    </div>

    <!-- D3 v7 -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <!-- TopoJSON client (must load before map script) -->
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script>
    (function () {
      "use strict";

      /* ────────────────────────────────────────────
         CONSTANTS
      ──────────────────────────────────────────── */
      const WIDTH  = 1000;
      const HEIGHT = 1000;
      const CX     = WIDTH  / 2;   // 500
      const CY     = HEIGHT / 2;   // 500

      // The equator sits at the midpoint between pole (centre) and edge
      // so equator radius = half of the full map radius.
      // Full disc radius (to 90°S): let's use 460 px  →  equator at 230 px.
      const MAP_RADIUS   = 460;    // radius of the full circular map (to 90°S)
      const EQUATOR_R    = MAP_RADIUS / 2;   // 230 px  (scale factor)

      /* ────────────────────────────────────────────
         D3 PROJECTION
         azimuthalEquidistant:
           .rotate([0,-90])  → centres on North Pole
           .scale(...)       → scale = MAP_RADIUS / π  so that the
                               South Pole (π radians from centre) maps
                               exactly to MAP_RADIUS px, and the Equator
                               (π/2 radians) maps to MAP_RADIUS/2 px.
           No clipAngle — the SVG <clipPath> circle handles disc clipping.
           clipAngle(90) would cut at the equator (90° from North Pole),
           hiding the entire southern hemisphere.
      ──────────────────────────────────────────── */
      const projection = d3.geoAzimuthalEquidistant()
        .rotate([0, -90])              // North Pole at centre
        .scale(MAP_RADIUS / Math.PI)   // equator at MAP_RADIUS/2 = 230 px
        .translate([CX, CY]);          // SVG clipPath handles the disc boundary

      const path = d3.geoPath().projection(projection);

      /* ────────────────────────────────────────────
         HELPER: projectToGleason(lat, lon) → [x, y]
         Uses the same D3 projection.
      ──────────────────────────────────────────── */
      function projectToGleason(lat, lon) {
        return projection([lon, lat]);   // D3 takes [longitude, latitude]
      }

      /* ────────────────────────────────────────────
         SVG SETUP
      ──────────────────────────────────────────── */
      const svg = d3.select("#gleason-svg");

      /* clip path: circle at MAP_RADIUS so nothing renders outside the disc */
      svg.append("defs")
        .append("clipPath")
          .attr("id", "map-clip")
        .append("circle")
          .attr("cx", CX).attr("cy", CY).attr("r", MAP_RADIUS);

      /* ocean background */
      svg.append("circle")
        .attr("cx", CX).attr("cy", CY).attr("r", MAP_RADIUS)
        .attr("class", "ocean");

      /* group clipped to disc */
      const g = svg.append("g").attr("clip-path", "url(#map-clip)");

      /* ────────────────────────────────────────────
         GRID: LATITUDE PARALLELS every 15°
         Latitudes: 75, 60, 45, 30, 15, 0, -15, -30, -45, -60, -75, -90
         Each latitude circle in azimuthal-equidistant has radius
           r = (90 - lat) / 180 * MAP_RADIUS   ... for our scale
         equivalently, colat in degrees * (MAP_RADIUS / 180)
      ──────────────────────────────────────────── */
      const latStep  = 15;
      // Include 90°S ring: range from -90 to 90 (exclusive), step 15 → covers -90,-75,...,75
      // plus add 90°S explicitly as the outer boundary ring
      const latLines = [...d3.range(-75, 90, latStep), -90];

      latLines.forEach(lat => {
        const colat = 90 - lat;                     // 0 at pole, 180 at south pole
        const r     = (colat / 180) * MAP_RADIUS;
        if (r <= 0) return;
        g.append("circle")
          .attr("cx", CX).attr("cy", CY).attr("r", r)
          .attr("class", "graticule-lat");
      });

      /* Latitude labels along the 3 o'clock radial (90°E longitude) */
      [...d3.range(-75, 76, latStep)].forEach(lat => {
        const [x, y] = projectToGleason(lat, 90) || [];
        if (x == null) return;
        g.append("text")
          .attr("x", x + 3).attr("y", y)
          .attr("class", "lat-label")
          .text(`${lat}°`);
      });

      /* ────────────────────────────────────────────
         GRID: HOUR (LONGITUDE) RADIAL LINES every 15°
         Longitudes 0, 15, 30 … 345  — drawn from pole to 90°S edge
         The prime meridian (0°) points at 12 o'clock.
      ──────────────────────────────────────────── */
      const lonStep  = 15;
      const lonLines = d3.range(0, 360, lonStep);

      const romanNumerals = [
        "XII", "I", "II", "III", "IV", "V", "VI",
        "VII", "VIII", "IX", "X", "XI"
      ];

      lonLines.forEach((lon, i) => {
        // Draw radial line: from pole (CX, CY) to the edge at 90°S for this longitude.
        const [x2, y2] = projectToGleason(-89.9, lon);

        g.append("line")
          .attr("x1", CX).attr("y1", CY)
          .attr("x2", x2).attr("y2", y2)
          .attr("class", "graticule-lon");

        // Hour labels just outside MAP_RADIUS
        const angleRad = (lon - 90) * Math.PI / 180; // 0° lon → 12 o'clock = -90° from east
        const lx = CX + (MAP_RADIUS + 22) * Math.cos(angleRad);
        const ly = CY + (MAP_RADIUS + 22) * Math.sin(angleRad);

        // Show Roman numeral for every 30° (24 hr / 12 labels = 30° per hour)
        if (lon % 30 === 0) {
          const numeral = romanNumerals[lon / 30];
          svg.append("text")           // outside clip group so labels are never clipped
            .attr("x", lx).attr("y", ly)
            .attr("class", "hour-label")
            .text(numeral);
        }
      });

      /* ────────────────────────────────────────────
         LAND: fetch Natural Earth 110m GeoJSON
      ──────────────────────────────────────────── */
      const GEOJSON_URL =
        "https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json";

      fetch(GEOJSON_URL)
        .then(r => r.json())
        .then(world => {
          const land = topojson.feature(world, world.objects.land);
          g.append("path")
            .datum(land)
            .attr("d", path)
            .attr("class", "land");

          // Draw pole dot last so it's on top of land
          g.append("circle")
            .attr("cx", CX).attr("cy", CY).attr("r", 6)
            .attr("class", "pole-dot");
        });

      /* outer decorative ring (rendered outside clip so it overlaps edge cleanly) */
      svg.append("circle")
        .attr("cx", CX).attr("cy", CY).attr("r", MAP_RADIUS)
        .attr("class", "outer-ring");

    })();
    </script>

    <script>
    (function () {
      'use strict';
      var disc    = document.getElementById('compass-disc');
      var needle  = document.getElementById('compass-needle');
      var permBtn = document.getElementById('compass-perm-btn');
      if (!disc || !needle) return;

      var smoothAlpha = 0, targetAlpha = 0;
      var smoothTiltX = 0, targetTiltX = 0;
      var smoothTiltY = 0, targetTiltY = 0;
      var rafRunning = false;

      function lerp(a, b, t) { return a + (b - a) * t; }

      function tick() {
        // Wrap-aware alpha lerp
        var diff = targetAlpha - smoothAlpha;
        if (diff > 180)  diff -= 360;
        if (diff < -180) diff += 360;
        smoothAlpha += diff * 0.1;

        smoothTiltX = lerp(smoothTiltX, targetTiltX, 0.08);
        smoothTiltY = lerp(smoothTiltY, targetTiltY, 0.08);

        needle.style.transform = 'rotate(' + (-smoothAlpha) + 'deg)';
        disc.style.transform   =
          'rotateX(' + (-smoothTiltX * 0.35) + 'deg) ' +
          'rotateY(' +  (smoothTiltY * 0.35) + 'deg)';

        requestAnimationFrame(tick);
      }

      function onOrientation(e) {
        if (e.alpha == null) return;
        targetAlpha = e.alpha;
        targetTiltX = Math.max(-30, Math.min(30, e.beta  || 0));
        targetTiltY = Math.max(-30, Math.min(30, e.gamma || 0));
        if (!rafRunning) { rafRunning = true; tick(); }
      }

      function startListening() {
        window.addEventListener('deviceorientation', onOrientation);
      }

      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13+ — needs explicit permission tap
        permBtn.style.display = 'block';
        permBtn.addEventListener('click', function () {
          DeviceOrientationEvent.requestPermission().then(function (state) {
            if (state === 'granted') { startListening(); permBtn.style.display = 'none'; }
          }).catch(function () {});
        });
      } else if (typeof DeviceOrientationEvent !== 'undefined') {
        // Android — fires without permission
        startListening();
      }
    })();
    </script>
  </body>
</html>
